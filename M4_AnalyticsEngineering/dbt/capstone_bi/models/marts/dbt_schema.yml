version: 2

models:
  - name: dim_product
    description: "Dimensión de productos — Gold layer"
    columns:
      - name: product_id
        tests: [unique, not_null]
      - name: price_usd
        tests: [not_null]
      - name: category
        tests: [not_null]
      - name: price_segment
        tests:
          - accepted_values:
              values: ['economy', 'mid-range', 'premium']

  - name: dim_category
    description: "Dimensión de categorías — Gold layer"
    columns:
      - name: category_id
        tests: [unique, not_null]
      - name: category_name
        tests: [unique, not_null]

  - name: fact_sales_support
    description: "Tabla de hechos central: productos × tickets — Gold layer"
    columns:
      - name: ticket_id
        tests: [not_null]
      - name: product_id
        tests:
          - not_null
          - relationships:
              to: ref('dim_product')
              field: product_id
      - name: category_id
        tests:
          - not_null
          - relationships:
              to: ref('dim_category')
              field: category_id
      - name: satisfaction_score
        tests: [not_null]
