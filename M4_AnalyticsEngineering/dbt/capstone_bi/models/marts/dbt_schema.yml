version: 2

models:
  - name: dim_product
    description: "Dimensión de productos — Gold layer"
    columns:
      - name: product_id
        tests: 
          - unique
          - not_null
      - name: price_usd
        tests: 
          - not_null
      - name: category
        tests: 
          - not_null
      - name: price_segment
        tests:
          - accepted_values:
              arguments: # <--- Corrección para evitar el Warning
                values: ['economy', 'mid-range', 'premium']

  - name: dim_category
    description: "Dimensión de categorías — Gold layer"
    columns:
      - name: category_id
        tests: [unique, not_null]
      - name: category_name
        tests: [unique, not_null]
