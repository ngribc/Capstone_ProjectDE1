version: 2

models:

  # ===========================================================================
  # stg_products
  # ===========================================================================
  - name: stg_products
    description: >
      Silver view — cleaned and typed products from FakeStore API.
      One row per product per snapshot_month.
    columns:
      - name: product_id
        description: "FakeStore product ID (1-20)"
        tests:
          - not_null
          - accepted_range:          # dbt-utils not needed — use custom test below
              config: {severity: error}

      - name: product_name
        tests: [not_null]

      - name: price_usd
        description: "Price in USD — must be positive"
        tests:
          - not_null
          - positive_value           # custom singular test (see tests/ folder)

      - name: category
        tests:
          - not_null
          - accepted_values:
              values:
                - "electronics"
                - "jewelery"
                - "men's clothing"
                - "women's clothing"

      - name: snapshot_month
        tests: [not_null]

  # ===========================================================================
  # stg_tickets
  # ===========================================================================
  - name: stg_tickets
    description: >
      Silver view — cleaned tickets from generated CSV.
      product_id (1-20) is a real FK to stg_products.
    columns:
      - name: ticket_id
        tests: [not_null, unique]

      - name: product_id
        description: "FK to stg_products (1-20)"
        tests:
          - not_null
          - relationships:
              to: ref('stg_products')
              field: product_id

      - name: purchase_date
        tests: [not_null]

      - name: issue_type
        tests: [not_null]

      - name: ticket_status
        tests:
          - not_null
          - accepted_values:
              values: ["Open","Pending","Closed","Resolved","Escalated"]

      - name: satisfaction_score
        tests:
          - not_null
          - satisfaction_between_1_and_5   # custom singular test

      - name: snapshot_month
        tests: [not_null]
