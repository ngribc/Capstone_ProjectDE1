name: 'capstone_bi'
version: '1.0.0'
config-version: 2

profile: 'capstone_bi'

model-paths: ["models"]
seed-paths:  ["seeds"]
test-paths:  ["tests"]          # dbt looks here for both singular AND generic tests
docs-paths:  ["docs"]

target-path: "target"
clean-targets: ["target"]

# ── Global test config ────────────────────────────────────────────────────────
tests:
  +store_failures: true          # Save failing rows to target/compiled/ for inspection
  +severity: error               # All tests are errors by default (not warnings)

# ── Model config ──────────────────────────────────────────────────────────────
models:
  capstone_bi:
    staging:
      +schema:       silver
      +materialized: view
      +tests:
        +severity: warn          # Staging tests are warnings (data may still be raw)
    marts:
      +schema:       gold
      +materialized: table
      +tests:
        +severity: error         # Mart tests are hard errors (Gold must be clean)
