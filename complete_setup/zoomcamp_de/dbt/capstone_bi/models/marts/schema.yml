version: 2
models:
  - name: dim_product
    columns:
      - name: product_id
        tests: [unique, not_null]
      - name: price_segment
        tests:
          - accepted_values:
              values: ['economy', 'mid-range', 'premium']
  - name: dim_category
    columns:
      - name: category_id
        tests: [unique, not_null]
      - name: category_name
        tests: [unique, not_null]
  - name: fact_sales_support
    columns:
      - name: ticket_id
        tests: [not_null]
      - name: product_id
        tests:
          - relationships:
              to: ref('dim_product')
              field: product_id
      - name: category_id
        tests:
          - relationships:
              to: ref('dim_category')
              field: category_id
