# docker maestro
version: '3.8'

services:
  # M1 — POSTGRES (Base de datos relacional)
  db:
    image: postgres:15-alpine  # <--- Versión Alpine (ocupa ~200MB vs 400MB)
    container_name: postgres
    environment:
      - POSTGRES_USER=root
      - POSTGRES_PASSWORD=root
      - POSTGRES_DB=ny_taxi
    ports:
      - "5432:5432"
    volumes:
      - ./ny_taxi_data:/var/lib/postgresql/data
    networks:
      - zoomcamp_net

  # M1 — PGADMIN (Interfaz gráfica para Postgres)
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: pgadmin
    environment:
      - PGADMIN_DEFAULT_EMAIL=admin@admin.com
      - PGADMIN_DEFAULT_PASSWORD=root
    ports:
      - "8081:80"
    networks:
      - zoomcamp_net
    depends_on:
      - db

  # M2 — KESTRA (Configuración corregida y funcional)
  kestra:
    image: kestra/kestra:latest
    container_name: kestra1
    user: "root"
    privileged: true
    entrypoint:
      - /bin/sh
      - -c
      - |
        apt-get update -qq
        apt-get install -y -qq python3 python3-pip python3-venv curl
        pip install --quiet dbt-duckdb pyarrow pandas kafka-python requests
        /app/kestra server standalone
    ports:
      - "18080:18080"
    environment:
      MICRONAUT_SERVER_PORT: 18080
      KESTRA_CONFIGURATION: |
        kestra:
          server:
            basic-auth:
              enabled: true
              username: "${KESTRA_USER:-admin@kestra.io}"
              password: "${KESTRA_PASS:-Admin1234}"
          repository:
            type: h2
          queue:
            type: h2
          storage:
            type: local
            local:
              base-path: "/app/storage"
    volumes:
      - ./flows:/app/flows
      - ./scripts:/app/scripts
      - ./storage:/app/storage
      - ./dbt:/app/dbt
      - ./duckdb:/shared/duckdb
      - ./data:/shared/data
      - /workspaces/Capstone_ProjectDE1/M2_Orchestration/kestra/data:/app/data
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      redpanda:
        condition: service_healthy
    networks:
      - zoomcamp_net
    restart: unless-stopped

  # M6 — REDPANDA (Kafka-compatible)
  redpanda:
    image: redpandadata/redpanda:v25.3.9
    container_name: redpanda
    command:
      - redpanda
      - start
      - --smp
      - '1'
      - --reserve-memory
      - 0M
      - --overprovisioned
      - --node-id
      - '1'
      - --kafka-addr
      - PLAINTEXT://0.0.0.0:29092,OUTSIDE://0.0.0.0:9092
      - --advertise-kafka-addr
      - PLAINTEXT://redpanda:29092,OUTSIDE://localhost:9092
      - --pandaproxy-addr
      - PLAINTEXT://0.0.0.0:28082,OUTSIDE://0.0.0.0:8082
      - --advertise-pandaproxy-addr
      - PLAINTEXT://redpanda:28082,OUTSIDE://localhost:8082
      - --rpc-addr
      - 0.0.0.0:33145
      - --advertise-rpc-addr
      - redpanda:33145
    ports:
      - "9092:9092"
      - "29092:29092"
      - "8082:8082"
      - "28082:28082"
    healthcheck:
      test: ["CMD", "rpk", "cluster", "info", "--brokers=localhost:9092"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - zoomcamp_net
      - streaming-network
    restart: unless-stopped

  # M4 — DBT
  dbt:
    build:
      context: ./dbt
      dockerfile: Dockerfile
    container_name: dbt
    volumes:
      - ./dbt:/usr/app/dbt
      - ./duckdb:/shared/duckdb
      - ./data:/shared/data
    working_dir: /usr/app/dbt/capstone_bi
    command: ["dbt", "debug", "--profiles-dir", "/usr/app/dbt"]
    networks:
      - zoomcamp_net

  # M5 — SPARK Master
  spark-master:
    image: apache/spark:3.5.1 
    container_name: spark-master
    user: root
    command: /opt/spark/bin/spark-class org.apache.spark.deploy.master.Master
    ports:
      - "8080:8080"
      - "7077:7077"
      - "4040:4040"
    volumes:
      - ./scripts:/opt/spark/scripts
      - ./data:/opt/spark/data
      - ./duckdb:/shared/duckdb
    networks:
      - zoomcamp_net
    restart: unless-stopped

  # M5 — SPARK Worker
  spark-worker:
    image: apache/spark:3.5.1 
    container_name: spark-worker
    user: root
    command: /opt/spark/bin/spark-class org.apache.spark.deploy.worker.Worker spark://spark-master:7077
    environment:
      - SPARK_WORKER_MEMORY=1G
      - SPARK_WORKER_CORES=2
    volumes:
      - ./scripts:/opt/spark/scripts
      - ./data:/opt/spark/data
    depends_on:
      - spark-master
    networks:
      - zoomcamp_net
    restart: unless-stopped
    
  # JUPYTER
  jupyter:
    image: jupyter/minimal-notebook:latest # <--- Versión Minimal
    container_name: jupyter
    user: root
    environment:
      JUPYTER_ENABLE_LAB: "yes"
      JUPYTER_TOKEN: "${JUPYTER_TOKEN:-zoomcamp}"
      GRANT_SUDO: "yes"
    ports:
      - "8888:8888"
    volumes:
      - ./notebooks:/workspaces/Capstone_ProjectDE1/M5_Batch/notebooks
      - ./duckdb:/shared/duckdb
      - ./data:/shared/data
    command: >
      bash -c "
        pip install --quiet duckdb pyarrow plotly pandas &&
        start-notebook.sh
          --NotebookApp.token='${JUPYTER_TOKEN:-zoomcamp}'
          --NotebookApp.ip='0.0.0.0'
          --NotebookApp.allow_origin='*'
      "
    networks:
      - zoomcamp_net
    restart: unless-stopped

  # M7 — SUPERSET
  superset:
    image: apache/superset:latest
    container_name: superset
    environment:
      SUPERSET_SECRET_KEY: "${SUPERSET_SECRET:-zoomcamp_secret_change_in_prod_32chars}"
    ports:
      - "8088:8088"
    volumes:
      - ./duckdb:/shared/duckdb
      - superset_home:/app/superset_home
    command: >
      bash -c "
        pip install --quiet duckdb-engine duckdb pyarrow &&
        superset db upgrade &&
        (superset fab create-admin
          --username admin --firstname Admin --lastname User
          --email admin@zoomcamp.io
          --password '${SUPERSET_PASS:-zoomcamp1234}'
          2>/dev/null || true) &&
        superset init &&
        superset run -h 0.0.0.0 -p 8088 --with-threads
      "
    networks:
      - zoomcamp_net
    restart: unless-stopped

networks:
  zoomcamp_net:
    driver: bridge
  pg-network:
    driver: bridge
  streaming-network:
    driver: bridge





volumes:
  superset_home:
