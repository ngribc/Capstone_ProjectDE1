id: batch_pipeline
namespace: de.project

tasks:
  - id: transform_csv
    type: io.kestra.plugin.scripts.python.Script
    beforeCommands:
      - pip install pandas
    script: |
      import pandas as pd
      df = pd.read_csv("/app/data/customer_support_tickets.csv")
      df.columns = df.columns.str.lower()
      df.to_csv("/tmp/clean_tickets.csv", index=False)

  - id: load_duckdb
    type: io.kestra.plugin.jdbc.duckdb.Query
    sql: |
      CREATE TABLE IF NOT EXISTS dim_ticket AS
      SELECT * FROM read_csv_auto('/tmp/clean_tickets.csv');
