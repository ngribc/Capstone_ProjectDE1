id: warehouse_pipeline
namespace: de.project

labels:
  env: dev
  team: data-engineering
  layer: warehouse

description: |
  1. Lee Parquet del Data Lake → carga Bronze en DuckDB
  2. Lee CSV tickets limpio → carga Bronze en DuckDB
  3. Ejecuta dbt run → construye Star Schema (Silver/Gold)
  4. Ejecuta dbt test → valida calidad del modelo

tasks:

  # ── PASO 1: Parquet → DuckDB (productos) ─────────────────────────────────
  - id: load_products_bronze
    type: io.kestra.plugin.jdbc.duckdb.Query
    sql: |
      -- Bronze: datos crudos de productos desde el Data Lake Parquet
      CREATE TABLE IF NOT EXISTS bronze_products (
          id             INTEGER,
          title          VARCHAR,
          price          DOUBLE,
          description    VARCHAR,
          category       VARCHAR,
          image          VARCHAR,
          snapshot_month VARCHAR,
          ingested_at    VARCHAR
      );

      -- Carga incremental: elimina solo el snapshot del mes actual
      DELETE FROM bronze_products
      WHERE snapshot_month = strftime(CURRENT_TIMESTAMP, '%Y-%m');

      -- Inserta desde todos los Parquet del Data Lake
      INSERT INTO bronze_products
      SELECT * FROM read_parquet(
          '/tmp/products_parquet/snapshot_month=*/products_*.parquet',
          hive_partitioning = true    -- lee la partición del nombre de carpeta
      )
      WHERE snapshot_month = strftime(CURRENT_TIMESTAMP, '%Y-%m');

      SELECT snapshot_month, COUNT(*) AS n FROM bronze_products
      GROUP BY snapshot_month ORDER BY snapshot_month;

  # ── PASO 2: CSV → DuckDB (tickets) ────────────────────────────────────────
  - id: load_tickets_bronze
    type: io.kestra.plugin.jdbc.duckdb.Query
    sql: |
      CREATE TABLE IF NOT EXISTS bronze_tickets (
          snapshot_month VARCHAR
      );

      DELETE FROM bronze_tickets
      WHERE snapshot_month = strftime(CURRENT_TIMESTAMP, '%Y-%m');

      INSERT INTO bronze_tickets
      SELECT *, strftime(CURRENT_TIMESTAMP, '%Y-%m') AS snapshot_month
      FROM read_csv_auto('/tmp/clean_tickets.csv', header=true, null_padding=true);

      SELECT snapshot_month, COUNT(*) AS n FROM bronze_tickets
      GROUP BY snapshot_month ORDER BY snapshot_month;

  # ── PASO 3: dbt run → Star Schema ────────────────────────────────────────
  - id: dbt_run
    type: io.kestra.plugin.scripts.shell.Commands
    taskRunner:
      type: io.kestra.plugin.core.runner.Process
    commands:
      - |
        DBT_DIR="/app/dbt/capstone_bi"
        if [ ! -d "$DBT_DIR" ]; then
          echo "[ERROR] Proyecto dbt no encontrado en $DBT_DIR"
          echo "Creá el proyecto con: dbt init capstone_bi"
          exit 1
        fi
        cd "$DBT_DIR"
        echo "=== dbt run ==="
        dbt run --profiles-dir /app/dbt --target prod
        echo "dbt run exit code: $?"

  # ── PASO 4: dbt test → Validación de calidad ─────────────────────────────
  - id: dbt_test
    type: io.kestra.plugin.scripts.shell.Commands
    taskRunner:
      type: io.kestra.plugin.core.runner.Process
    commands:
      - |
        cd /app/dbt/capstone_bi
        echo "=== dbt test ==="
        dbt test --profiles-dir /app/dbt --target prod
        echo "dbt test exit code: $?"

errors:
  - id: log_failure
    type: io.kestra.plugin.core.log.Log
    message: "❌ warehouse_pipeline falló en task={{ task.id }} | execution={{ execution.id }}"
